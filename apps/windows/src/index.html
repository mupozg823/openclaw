<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { color: #ff4655; font-size: 1.5rem; }
    p { color: #888; font-size: 0.9rem; }
    .status { color: #4caf50; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenClaw</h1>
    <p>AI Assistant for ROG Ally X</p>
    <p class="status">Running in system tray</p>
    <p>Press <kbd>Win+Space</kbd> to toggle overlay</p>
  </div>
</body>
</html>
